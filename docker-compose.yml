services:
  meeting-analysis:
    build:
      context: .
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        PROJECT_PUBLIC_URL: ${PROJECT_PUBLIC_URL}
    container_name: meeting-analysis
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
    ports:
      - "127.0.0.1:3011:3000"
    volumes:
      - lark-cli-config:/app/.lark-cli

volumes:
  lark-cli-config:
